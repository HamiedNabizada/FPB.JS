<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPB.JS - Event Export Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 10px 20px; background: #f5f5f5; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 15px; }
    header h1 { font-size: 18px; color: #333; }
    .toolbar { display: flex; gap: 8px; }
    .toolbar button { padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px; background: white; cursor: pointer; font-size: 13px; }
    .toolbar button:hover { background: #e8e8e8; }
    .content { display: flex; flex: 1; overflow: hidden; }
    #modeler-container { flex: 1; position: relative; }
    #log-panel { width: 350px; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
    #log-panel h2 { padding: 10px; font-size: 14px; background: #f9f9f9; border-bottom: 1px solid #ddd; }
    #log-output { flex: 1; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
    .log-entry { margin-bottom: 8px; padding: 6px; background: #f0f7ff; border-left: 3px solid #3050a2; }
    .log-entry.error { background: #fff0f0; border-left-color: #ed2028; }
  </style>
</head>
<body>
  <header>
    <h1>Event Export Example</h1>
    <div class="toolbar">
      <button id="btn-export-json">Export JSON (Event)</button>
      <button id="btn-export-xml">Export XML (Event)</button>
      <button id="btn-clear-log">Clear Log</button>
    </div>
  </header>
  <div class="content">
    <div id="modeler-container"></div>
    <div id="log-panel">
      <h2>Event Log</h2>
      <div id="log-output"></div>
    </div>
  </div>
</body>
</html>
