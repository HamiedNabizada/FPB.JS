<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPB.JS - Import/Export Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 10px 20px; background: #f5f5f5; border-bottom: 1px solid #ddd; }
    header h1 { font-size: 18px; color: #333; margin-bottom: 8px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
    .toolbar button { padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px; background: white; cursor: pointer; font-size: 13px; }
    .toolbar button:hover { background: #e8e8e8; }
    .toolbar button.primary { background: #13ae4d; color: white; border-color: #13ae4d; }
    .toolbar button.primary:hover { background: #0e9040; }
    .toolbar .separator { width: 1px; background: #ddd; margin: 0 4px; }
    .content { display: flex; flex: 1; overflow: hidden; }
    #modeler-container { flex: 1; position: relative; }
    #output-panel { width: 400px; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
    #output-panel h2 { padding: 10px; font-size: 14px; background: #f9f9f9; border-bottom: 1px solid #ddd; }
    #output-content { flex: 1; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all; background: #fafafa; }
    .status { padding: 6px 20px; font-size: 12px; background: #eef; border-top: 1px solid #ddd; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Import / Export Example</h1>
    <div class="toolbar">
      <button id="btn-import-json" class="primary">Import JSON</button>
      <button id="btn-import-xml" class="primary">Import XML</button>
      <div class="separator"></div>
      <button id="btn-export-json">Export JSON</button>
      <button id="btn-export-xml">Export XML</button>
      <button id="btn-export-svg">Export SVG</button>
      <div class="separator"></div>
      <button id="btn-download-json">Download JSON</button>
      <button id="btn-download-xml">Download XML</button>
    </div>
  </header>
  <div class="content">
    <div id="modeler-container"></div>
    <div id="output-panel">
      <h2 id="output-title">Output</h2>
      <div id="output-content">Click an export button to see the output here.</div>
    </div>
  </div>
  <div class="status" id="status">Ready</div>
  <input type="file" id="file-input-json" accept=".json,.fpb">
  <input type="file" id="file-input-xml" accept=".xml">
</body>
</html>
